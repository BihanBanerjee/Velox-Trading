name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.4"

      - name: Install dependencies
        run: bun install

      - name: Lint
        run: bun run lint

      - name: Type check
        run: bun run check-types

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          key: ${{ secrets.DROPLET_SSH_KEY }}
          command_timeout: 60m
          script: |
            cd /root/Velox-Trading
            git pull origin main
            docker compose -f docker-compose.prod.yml build liquidation-engine
            docker compose -f docker-compose.prod.yml build http-backend
            docker compose -f docker-compose.prod.yml build realtime-server
            docker compose -f docker-compose.prod.yml build price-poller
            docker compose -f docker-compose.prod.yml build db-worker
            docker compose -f docker-compose.prod.yml build batch-uploader
            docker compose -f docker-compose.prod.yml up -d
            docker compose -f docker-compose.prod.yml restart nginx
            docker builder prune -af
