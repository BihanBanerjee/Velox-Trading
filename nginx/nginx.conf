events {
    worker_connections 1024;
}

http {
    # ── Rate limiting ──
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

    # ── Upstream services ──
    upstream http_backend {
        server http-backend:3005;
    }

    upstream realtime_server {
        server realtime-server:3006;
    }

    # ── HTTP → HTTPS redirect ──
    server {
        listen 80;
        server_name velox.bihanbanerjee.com;

        # Certbot challenge (needed for SSL certificate renewal)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect everything else to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS server ──
    server {
        listen 443 ssl;
        server_name velox.bihanbanerjee.com;

        # ── SSL certificates (managed by Certbot) ──
        ssl_certificate     /etc/letsencrypt/live/velox.bihanbanerjee.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/velox.bihanbanerjee.com/privkey.pem;

        # ── SSL hardening ──
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # ── API routes → http-backend ──
        location /api/ {
            limit_req zone=api burst=50 nodelay;

            proxy_pass http://http_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Candles route → http-backend ──
        location /candles {
            limit_req zone=api burst=50 nodelay;

            proxy_pass http://http_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── WebSocket → realtime-server ──
        location /ws {
            proxy_pass http://realtime_server;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket timeout — keep alive for 1 hour
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ── Health check ──
        location /health {
            return 200 'ok';
            add_header Content-Type text/plain;
        }

        # ── Block everything else ──
        location / {
            return 404;
        }
    }
}
